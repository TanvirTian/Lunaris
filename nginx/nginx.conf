events {
    worker_connections 1024;
}

http {
    # Trust the Docker internal networks for X-Forwarded-For headers.
    # This tells nginx which source IPs are trusted proxies.
    # Prevents external clients from spoofing their IP via the header.
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  10.0.0.0/8;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    server {
        listen 80;

        location / {
            proxy_pass          http://backend:8000;

            # Forward the real client IP to Fastify.
            # Fastify reads this via trustProxy:true → request.ip.
            # Without this, every user arrives as 172.17.0.1 (Docker gateway)
            # and shares a single rate-limit bucket — causing false 429s.
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Host              $host;

            # proxy_read_timeout must exceed the max crawl duration (60s).
            # If nginx closes the connection before the scan completes,
            # the client gets a 502 even though the backend is still working.
            proxy_connect_timeout  10s;
            proxy_send_timeout     90s;
            proxy_read_timeout     90s;
        }
    }
}
